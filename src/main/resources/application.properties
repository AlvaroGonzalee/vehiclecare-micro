spring.application.name=vehiclecare-micro
server.address=0.0.0.0
server.port=8080

# ===============================
# DATASOURCE (MySQL)
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# CATALOG SYNC
# ===============================
# Cuando está en true, el backend sincroniza marcas y modelos desde vPIC
# al arrancar / según la tarea programada. Normalmente debe permanecer en false.
catalog.sync.enabled=false

# ===============================
# MINIO STORAGE
# ===============================
minio.bucket=vehiclecare
minio.initialize-bucket=true

# ===============================
# MULTIPART
# ===============================
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ===============================
# JWT
# ===============================
security.jwt.expiration-seconds=86400

# ===============================
# LOGGING
# ===============================
logging.level.com.vehiclecare.vehiclecaremicro=INFO

# ===============================
# LOCAL PROFILE
# ===============================
# La configuracion privada/local vive en application-local.properties
# y solo se carga cuando se arranca con el perfil "local".
#
# Mover ahi:
# - spring.datasource.url
# - spring.datasource.username
# - spring.datasource.password
# - minio.endpoint
# - minio.access-key
# - minio.secret-key
# - security.jwt.secret
