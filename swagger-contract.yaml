openapi: 3.0.3
info:
  title: VehicleCare API
  version: 0.1.0
  description: Contrato inicial para VehicleCare
servers:
  - url: http://localhost:8080
tags:
  - name: Auth
  - name: Users
  - name: Vehicles
  - name: Records
  - name: Catalog
  - name: Admin
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Registro de usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRegisterRequest"
            examples:
              ok:
                value:
                  email: "alvaro@example.com"
                  password: "123456"
      responses:
        "201":
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              examples:
                ok:
                  value:
                    id: "a1b2c3d4"
                    email: "alvaro@example.com"
                    token: "c6a8f5b2-9e3b-4a1e-8f8f-1b2c3d4e5f60"
        "400":
          $ref: "#/components/responses/BadRequest"
  /auth/login:
    post:
      tags: [Auth]
      summary: Login de usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
            examples:
              ok:
                value:
                  email: "alvaro@example.com"
                  password: "123456"
      responses:
        "200":
          description: Login correcto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              examples:
                ok:
                  value:
                    id: "a1b2c3d4"
                    email: "alvaro@example.com"
                    token: "c6a8f5b2-9e3b-4a1e-8f8f-1b2c3d4e5f60"
        "400":
          $ref: "#/components/responses/BadRequest"
  /users:
    post:
      tags: [Users]
      summary: Crear usuario (legacy)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
            examples:
              ok:
                value:
                  email: "alvaro@example.com"
                  password: "123456"
      responses:
        "201":
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /vehicles:
    get:
      tags: [Vehicles]
      summary: Listar vehículos del usuario
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
          example: "a1b2c3d4"
      responses:
        "200":
          description: Lista de vehículos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VehicleResponse"
              examples:
                ok:
                  value:
                    - id: "veh00001"
                      userId: "a1b2c3d4"
                      brand: "Ford"
                      model: "Focus"
                      year: 2018
                      licensePlate: "1234ABC"
                      vin: "1HGBH41JXMN109186"
                      currentKilometers: 82000
                      fuelType: "Gasolina"
    post:
      tags: [Vehicles]
      summary: Crear vehículo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleCreateRequest"
            examples:
              ok:
                value:
                  userId: "a1b2c3d4"
                  brand: "Ford"
                  model: "Focus"
                  year: 2018
                  licensePlate: "1234ABC"
                  vin: "1HGBH41JXMN109186"
                  currentKilometers: 82000
                  fuelType: "Gasolina"
      responses:
        "201":
          description: Vehículo creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /vehicles/{id}:
    get:
      tags: [Vehicles]
      summary: Obtener vehículo por id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "veh00001"
      responses:
        "200":
          description: Vehículo encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleResponse"
        "404":
          description: No encontrado
    put:
      tags: [Vehicles]
      summary: Actualizar vehículo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "veh00001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleUpdateRequest"
            examples:
              ok:
                value:
                  brand: "Ford"
                  model: "Focus"
                  year: 2019
                  licensePlate: "1234ABC"
                  vin: "1HGBH41JXMN109186"
                  currentKilometers: 90000
                  fuelType: "Gasolina"
      responses:
        "200":
          description: Vehículo actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: No encontrado
    delete:
      tags: [Vehicles]
      summary: Eliminar vehículo
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "veh00001"
      responses:
        "204":
          description: Eliminado
        "404":
          description: No encontrado
  /vehicles/{vehicleId}/records:
    get:
      tags: [Records]
      summary: Listar registros de un vehículo
      parameters:
        - in: path
          name: vehicleId
          required: true
          schema:
            type: string
          example: "veh00001"
      responses:
        "200":
          description: Lista de registros
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaintenanceRecordResponse"
    post:
      tags: [Records]
      summary: Crear registro de mantenimiento
      parameters:
        - in: path
          name: vehicleId
          required: true
          schema:
            type: string
          example: "veh00001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceRecordCreateRequest"
            examples:
              ok:
                value:
                  title: "Cambio de aceite"
                  date: "2026-02-01"
                  category: "Mantenimiento"
                  kilometers: 85000
                  price: 89.90
                  description: "Cambio de aceite y filtro"
                  attachments:
                    - fileName: "factura.pdf"
                      fileType: "pdf"
                      filePath: "/uploads/factura.pdf"
      responses:
        "201":
          description: Registro creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
  /records/{id}:
    get:
      tags: [Records]
      summary: Obtener registro por id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "rec00001"
      responses:
        "200":
          description: Registro encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecordResponse"
        "404":
          description: No encontrado
    put:
      tags: [Records]
      summary: Actualizar registro
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "rec00001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceRecordUpdateRequest"
      responses:
        "200":
          description: Registro actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceRecordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          description: No encontrado
    delete:
      tags: [Records]
      summary: Eliminar registro
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "rec00001"
      responses:
        "204":
          description: Eliminado
        "404":
          description: No encontrado
  /brands:
    get:
      tags: [Catalog]
      summary: Listar marcas
      parameters:
        - in: query
          name: q
          schema:
            type: string
          example: "fo"
        - in: query
          name: page
          schema:
            type: integer
          example: 0
        - in: query
          name: size
          schema:
            type: integer
          example: 20
      responses:
        "200":
          description: Página de marcas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageBrandResponse"
  /brands/{id}/models:
    get:
      tags: [Catalog]
      summary: Listar modelos por marca
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "460"
        - in: query
          name: q
          schema:
            type: string
          example: "focus"
        - in: query
          name: page
          schema:
            type: integer
          example: 0
        - in: query
          name: size
          schema:
            type: integer
          example: 20
      responses:
        "200":
          description: Página de modelos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageModelResponse"
  /years:
    get:
      tags: [Catalog]
      summary: Listar años disponibles
      responses:
        "200":
          description: Lista de años
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
              examples:
                ok:
                  value: [2026, 2025, 2024, 2023]
  /admin/catalog/sync:
    post:
      tags: [Admin]
      summary: Sincronizar catálogo con vPIC
      responses:
        "202":
          description: Sync encolado
        "400":
          $ref: "#/components/responses/BadRequest"
components:
  responses:
    BadRequest:
      description: Solicitud inválida
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            validation:
              value:
                timestamp: "2026-02-07T12:00:00Z"
                status: 400
                error: "Validación incorrecta"
                path: "/vehicles"
                details:
                  - field: "brand"
                    message: "La marca es obligatoria"
  schemas:
    AuthRegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        token:
          type: string
    UserRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
    VehicleCreateRequest:
      type: object
      required: [userId, brand, model, year, licensePlate]
      properties:
        userId:
          type: string
        brand:
          type: string
          maxLength: 100
        model:
          type: string
          maxLength: 100
        year:
          type: integer
        licensePlate:
          type: string
          minLength: 7
          maxLength: 7
        vin:
          type: string
          maxLength: 50
        currentKilometers:
          type: integer
        fuelType:
          type: string
          maxLength: 50
    VehicleUpdateRequest:
      type: object
      required: [brand, model, year, licensePlate]
      properties:
        brand:
          type: string
          maxLength: 100
        model:
          type: string
          maxLength: 100
        year:
          type: integer
        licensePlate:
          type: string
          minLength: 7
          maxLength: 7
        vin:
          type: string
          maxLength: 50
        currentKilometers:
          type: integer
        fuelType:
          type: string
          maxLength: 50
    VehicleResponse:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        brand:
          type: string
        model:
          type: string
        year:
          type: integer
        licensePlate:
          type: string
        vin:
          type: string
        currentKilometers:
          type: integer
        fuelType:
          type: string
    AttachmentRequest:
      type: object
      properties:
        fileName:
          type: string
          maxLength: 50
        fileType:
          type: string
          enum: [jpg, jpeg, png, pdf, doc, docx, txt]
        filePath:
          type: string
          maxLength: 500
    MaintenanceRecordCreateRequest:
      type: object
      required: [title, date, category]
      properties:
        title:
          type: string
          maxLength: 150
        date:
          type: string
          format: date
        category:
          type: string
          enum: [Reparación, Mantenimiento, Mejora, Extra]
        kilometers:
          type: integer
        price:
          type: number
          format: float
        description:
          type: string
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentRequest"
    MaintenanceRecordUpdateRequest:
      type: object
      required: [title, date, category]
      properties:
        title:
          type: string
          maxLength: 150
        date:
          type: string
          format: date
        category:
          type: string
          enum: [Reparación, Mantenimiento, Mejora, Extra]
        kilometers:
          type: integer
        price:
          type: number
          format: float
        description:
          type: string
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentRequest"
    MaintenanceRecordResponse:
      type: object
      properties:
        id:
          type: string
        vehicleId:
          type: string
        title:
          type: string
        date:
          type: string
          format: date
        category:
          type: string
        kilometers:
          type: integer
        price:
          type: number
          format: float
        description:
          type: string
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentRequest"
    PageBrandResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BrandResponse"
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
          format: int64
    PageModelResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ModelResponse"
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
          format: int64
    BrandResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
    ModelResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        brandId:
          type: string
    ApiError:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        path:
          type: string
        details:
          type: array
          items:
            $ref: "#/components/schemas/ApiFieldError"
    ApiFieldError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
